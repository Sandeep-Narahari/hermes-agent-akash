name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"          # e.g. v1.0.0 → also triggers a versioned tag
  pull_request:
    branches:
      - main              # build-only (no push) for PRs to catch breakage early
  workflow_dispatch:      # allow manual triggers from the GitHub UI

# ---------------------------------------------------------------------------
# Concurrency: cancel in-progress runs on the same branch/PR to save minutes
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # image name = ghcr.io/<owner>/<repo>  (all lower-case)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read          # checkout
      packages: write         # push to GHCR
      id-token: write         # (optional) OIDC – future signing with cosign

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (for cross-platform builds) ───────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx (multi-arch, layer cache) ────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to GitHub Container Registry ───────────────────────────────
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Extract Docker metadata (tags + labels) ───────────────────────────
      #   Produces:
      #     • ghcr.io/<owner>/<repo>:main          (branch push)
      #     • ghcr.io/<owner>/<repo>:v1.2.3        (version tag)
      #     • ghcr.io/<owner>/<repo>:latest        (version tag only)
      #     • ghcr.io/<owner>/<repo>:<short-sha>   (always)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── 6. Build and (optionally) push ───────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64          # add linux/arm64 if you need ARM hosts
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache – keeps build fast on repeat runs
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HERMES_BRANCH=main
